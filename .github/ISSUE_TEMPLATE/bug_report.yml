name: Bug Report
description: Report a bug in GroundTruth MCP
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: GroundTruth version
      placeholder: "2.5.4"
    validations:
      required: true
  - type: dropdown
    id: client
    attributes:
      label: MCP client
      options:
        - Claude Code
        - Cursor
        - VS Code
        - Claude Desktop
        - Other
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "24.x"
